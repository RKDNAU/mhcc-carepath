name: Azure Web App CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build and prepare deployment
        run: |
          npm ci
          npm run build:client
          npm prune --omit=dev

      - name: Verify production node_modules
        run: |
          echo "=== Top-level packages after prune ==="
          ls node_modules/
          echo "=== express present ==="
          ls node_modules/express/package.json && echo "YES" || echo "NO - MISSING"
          echo "=== better-sqlite3 present ==="
          ls node_modules/better-sqlite3/package.json && echo "YES" || echo "NO - MISSING"

      - name: Create deployment zip
        run: zip -r deploy.zip . --exclude ".git/*" --exclude "*.bat" --exclude "src/*"

      - name: Verify zip contents
        run: |
          echo "=== express in zip ==="
          unzip -l deploy.zip | grep "node_modules/express/package.json" || echo "MISSING FROM ZIP"
          echo "=== zip size ==="
          ls -lh deploy.zip

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
