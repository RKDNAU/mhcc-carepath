name: Validate

on:
  pull_request:
    branches:
      - main

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: pip install trufflehog

      - name: Run trufflehog
        run: trufflehog filesystem . --fail

  env-check:
    name: Env Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets match .env.example
        env:
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
        shell: bash
        run: |
          missing=()
          while IFS= read -r line; do
            if [[ "$line" =~ ^[A-Z_][A-Z0-9_]*= ]]; then
              var_name="${line%%=*}"
              if ! echo "$SECRETS_CONTEXT" | grep -q "\"${var_name}\""; then
                missing+=("$var_name")
              fi
            fi
          done < .env.example

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: The following variables from .env.example are missing from repository secrets:"
            for var in "${missing[@]}"; do
              echo "  - $var"
            done
            exit 1
          fi

          echo "All variables from .env.example are present in repository secrets."

  config-check:
    name: Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Check staticwebapp.config.json for authenticated routes
        shell: bash
        run: |
          if [ ! -f staticwebapp.config.json ]; then
            echo "ERROR: staticwebapp.config.json not found."
            exit 1
          fi

          count=$(jq '[.routes[]? | select(.allowedRoles? | arrays | any(. == "authenticated"))] | length' staticwebapp.config.json)

          if [ "$count" -eq 0 ]; then
            echo "ERROR: No routes with allowedRoles containing \"authenticated\" found in staticwebapp.config.json."
            exit 1
          fi

          echo "Found $count route(s) with allowedRoles containing \"authenticated\"."
